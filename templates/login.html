{% extends 'base.html' %}
{% block title %}Ingresar — Plaza Games{% endblock %}

{% block login_content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

  body { font-family: 'Outfit', sans-serif; }

  .login-bg {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0b0d12;
    overflow: hidden;
  }

  /* Mismos brillos que el sidebar */
  .login-bg::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(201,168,76,.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .login-bg::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,168,76,.05) 0%, transparent 65%);
    pointer-events: none;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: #0f1117;
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.03);
    position: relative;
    z-index: 1;
  }

  /* Header del card — réplica del sidebar-brand */
  .login-header {
    padding: 32px 32px 24px;
    border-bottom: 1px solid rgba(201,168,76,.12);
    text-align: center;
  }

  .login-brand-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #c9a84c 0%, #8a5e20 100%);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #0f1117;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(201,168,76,.4), inset 0 1px 0 rgba(255,255,255,.15);
  }

  .login-title {
    color: #f0ece4;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: .5px;
    margin: 0;
  }

  .login-subtitle {
    color: #7a7570;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-top: 4px;
  }

  /* Body del form */
  .login-body {
    padding: 28px 32px 32px;
  }

  .login-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #7a7570;
    margin-bottom: 6px;
  }

  .login-input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  .login-input-wrap i {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: #4a4540;
    font-size: 14px;
    pointer-events: none;
  }

  .login-input {
    width: 100%;
    background: #080a0f;
    border: 1.5px solid rgba(201,168,76,.12);
    border-radius: 9px;
    color: #f0ece4;
    font-size: 14px;
    font-family: 'Outfit', sans-serif;
    padding: 11px 14px 11px 38px;
    transition: border-color .18s, box-shadow .18s;
    outline: none;
    box-sizing: border-box;
  }

  .login-input::placeholder { color: #3a3530; }

  .login-input:focus {
    border-color: #c9a84c;
    box-shadow: 0 0 0 3px rgba(201,168,76,.12);
  }

  .login-btn {
    width: 100%;
    height: 44px;
    background: linear-gradient(135deg, #c9a84c, #a07830);
    border: none;
    border-radius: 9px;
    color: #0f1117;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
    letter-spacing: .3px;
    cursor: pointer;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity .15s, transform .1s;
    box-shadow: 0 4px 16px rgba(201,168,76,.3);
  }

  .login-btn:hover { opacity: .9; transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }

  .login-error {
    background: rgba(220,38,38,.1);
    border: 1px solid rgba(220,38,38,.25);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    color: rgba(201,168,76,.3);
    font-size: 11px;
    letter-spacing: .3px;
  }
</style>

<div class="login-bg">
  <div style="width:100%;max-width:420px;padding:20px;position:relative;z-index:1;">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-brand-icon">
          <i class="bi bi-graph-up-arrow"></i>
        </div>
        <div class="login-title">PLAZA GAMES</div>
        <div class="login-subtitle">Sistema de Control</div>
      </div>

      <!-- Form -->
      <div class="login-body">
        {% if messages %}
          {% for message in messages %}
          <div class="login-error">
            <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
            {{ message }}
          </div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <label class="login-label" for="username">Usuario</label>
          <div class="login-input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="username" id="username"
                   class="login-input"
                   placeholder="Tu nombre de usuario"
                   required autofocus>
          </div>

          <label class="login-label" for="password">Contraseña</label>
          <div class="login-input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" id="password"
                   class="login-input"
                   placeholder="••••••••"
                   required>
          </div>

          <button type="submit" class="login-btn">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
          </button>
        </form>
      </div>

    </div>

    <div class="login-footer">Plaza Games &copy; {% now "Y" %}</div>
  </div>
</div>
{% endblock %}
